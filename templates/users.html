<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User</title>
    <style>
        body {
            background: #121212;
            color: white;
            font-family: "Hanken Grotesk", sans-serif;
            font-weight: 400;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .column {
            display: flex;
            flex-direction: column;
        }
        .box {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            margin-bottom: 10px;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #2a2a2a;
            color: white;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #b2f15a;
            border: none;
            border-radius: 6px;
            color: #2a2a2a;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="column">

<h2>Add User</h2>
<div class="box">
    <form method="post" action="/users/add">
        <input name="username" placeholder="Name" required>
        <input name="email" placeholder="Email" required>
        <input name="password" placeholder="Password" required>
        <button type="submit">Create User</button>
    </form>
</div>

<h2>All Users</h2>

<div class="box">
    <p>Trigger causes email addresses to be stored in lowercase</p>
    {% for u in users %}
        <div>
            <strong>{{ u.username }}</strong> —
            {{ u.email }}
        </div>
    {% endfor %}
</div>

<a href="/login" style="color: #b2f15a;">Back to login</a>
</div>

</body>
</html>

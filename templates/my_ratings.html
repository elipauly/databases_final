<!DOCTYPE html>
<html>
<head>
    <title>My Ratings</title>
    <style>
    body {
        font-family: "Hanken Grotesk", sans-serif;
        font-optical-sizing: auto;
        font-weight: 400;
        font-style: normal;
        margin: 0;
        color:azure;
        background-color: rgb(33, 33, 32);
    }

    header {
        font-family: "Special Elite", system-ui;
        font-weight: 400;
        font-style: normal;
        text-align: center;
        font-size: 1.8rem;
        padding: 20px;

    }

    .container {
        max-width: 80vw;
        margin: 30px auto;
        padding: 0 20px;
    }
    .card {
        background: rgb(59, 60, 58);
        border-radius: 12px;
        padding: 18px;
        margin-bottom: 20px;
        box-shadow: 0 4px 10px #0000;
        transition: transform 0.1s ease;
    }
    .card:hover {
        transform: scale(1.01);
    }
    .song-title{
        font-family: "Special Elite", system-ui;
        font-weight: 400;
        font-style: normal;
        font-size: 1.3rem;
        color:azure;
    }

    .meta {
        margin: 5px;
        color:azure;
    }
    .rating {
        margin-top: 10px;
    }
    .stars {
        color: #b2f15a
    }

    .comment {
        margin-top: 10px;
        font-weight: 600;
    }
    .empty {
        text-align: center;
        margin-top: 50px;
        color:azure;
    }
    .grid {
        display:grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 20px;
    }
    .reviews {
        margin-top: 10px;
        border-top: 1px solid #333;
        padding-top: 10px;
        max-height: 200px;
        overflow-y: auto;
    }
    .review {
        margin-bottom: 10px;
        padding-bottom: 8px;
        border-bottom: 1px solid #2a2a2a;
    }
    .review-user {
        font-weight: bold;
    }

    .comment {
        font-style: italic;
        color: #ddd;
    }

    /* FORM */
    .review-form {
        margin-top: auto;
        border-top: 1px solid #333;
        padding-top: 10px;
    }

    .review-form input,
    .review-form textarea {
        width: 100%;
        margin-bottom: 8px;
        padding: 8px;
        border-radius: 6px;
        border: none;
        background: #2a2a2a;
        color: white;
    }

    .review-form button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        background: #b2f15a;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }

    .review-form button:hover {
        background: #b2f15a;
    }
    </style>
</head>

<body>
    <h2>My Ratings</h2>

    <div class="grid">
        {% for r in ratings %}
        <div class="card">
            <div class = "title">{{ r.songName }} </div>

            <div class="meta">
                {{ r.albumName }}
            </div>
            <div class="rating">
                My Rating: {{ r.userRating }} ★
            </div>
            {% if r.comments %}
            <div class="meta">
                {{ r.comments }}
            </div>
            {% endif %}
            <div class="avg">
                Avg Rating: {{ r.overallAvgRating }}
            </div>
        </div>
        {% endfor %}
    </div>
</body>

</html>
